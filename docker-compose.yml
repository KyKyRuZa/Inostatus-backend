services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: innostatus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-innostatus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innostatus_password}
      POSTGRES_DB: ${POSTGRES_DB:-innostatus_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - innostatus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-innostatus} -d ${POSTGRES_DB:-innostatus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innostatus-backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-innostatus}:${POSTGRES_PASSWORD:-innostatus_password}@pgbouncer:6432/${POSTGRES_DB:-innostatus_db}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      CHECK_FRAGMENT_API_KEY: ${CHECK_FRAGMENT_API_KEY}
      CHECK_FRAGMENT_API_URL: ${CHECK_FRAGMENT_API_URL:-https://api.signature-search.ru/api/check_fragment}
      INTEGRATOR_ID: ${INTEGRATOR_ID:-NO VENDOR}
      SMTP_SERVER: ${SMTP_SERVER:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SEND_EMAIL: ${SEND_EMAIL:-info@inostatus.ru}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DEBUG: ${DEBUG:-false}
      # Audit logging configuration
      DEV_MODE: ${DEV_MODE:-false}
      LOGS_DIR: /var/log/innostatus
    volumes:
      - .:/app
      - backend_logs:/var/log/innostatus
    networks:
      - innostatus-network
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: innostatus-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    networks:
      - innostatus-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://backend:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # PgBouncer - Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: innostatus-pgbouncer
    ports:
      - "6433:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - innostatus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U innostatus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # MailDev - SMTP сервер для разработки
  maildev:
    image: maildev/maildev:latest
    container_name: innostatus-maildev
    ports:
      - "1080:1080"  # Веб-интерфейс
      - "1025:1025"  # SMTP
    restart: unless-stopped
    networks:
      - innostatus-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:1080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  innostatus-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local
